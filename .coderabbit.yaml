# .coderabbit.yaml
language: en
reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/*.md"
    - "!**/migrations/**"
    - "!**/package-lock.json"
    - "!**/requirements.txt"
    - "!**/*.lock"
    - "!**/dist/**"
    - "!**/.env*"
  path_instructions:
    - path: "frontend/**"
      instructions: "Focus on React best practices and TypeScript types"
    - path: "backend/**"
      instructions: "Check Django security and DRF patterns"
    - path: "frontend/src/components/**"
      instructions: "Ensure components are reusable and properly typed with props interfaces"
    - path: "backend/**/views.py"
      instructions: "Verify permission checks and proper error handling"
    - path: "backend/**/serializers.py"
      instructions: "Check for proper validation and security"

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
