name: CI

on:
  pull_request:
  push:
    branches: [main]

# One run per ref; a new push cancels the in-flight run for that ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gamedev_db
          POSTGRES_USER: gamedev_user
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gamedev_user -d gamedev_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      # WhiteNoise's manifest static storage (active whenever DEBUG is false)
      # refuses to serve without a staticfiles.json, so build it before the
      # suite runs. Doubles as a check that render.yaml's build command works.
      - name: Collect static files
        working-directory: backend
        env:
          DB_HOST: localhost
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: python manage.py collectstatic --noinput

      - name: Run tests
        working-directory: backend
        # DB name/user/password/port fall through to the settings defaults,
        # which match the postgres service env above. pytest-django creates
        # and destroys its own test_gamedev_db.
        #
        # DEBUG is deliberately left unset so the suite runs under the
        # production default (False); SECRET_KEY satisfies the settings guard
        # that pairs with it. USE_HTTPS stays unset, so no SSL redirects.
        env:
          DB_HOST: localhost
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: pytest

  frontend:
    name: Frontend (tsc, lint, build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Production build
        working-directory: frontend
        # Deliberately overlaps the type check (build runs `tsc -b`): this
        # proves the exact Vite production bundle Cloudflare Pages will run
        # compiles. Since Phase 39, vite.config.ts fails production builds
        # that lack VITE_API_URL (so Pages can't ship a site pointed at
        # localhost) — CI satisfies the guard with a dummy value.
        env:
          VITE_API_URL: "http://localhost:8000/api"
        run: npm run build
