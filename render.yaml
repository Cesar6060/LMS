# ============================================================================
# SERVICE SHAPE IS LIVE-SYNCED — env vars are NOT. Edit with care.
# ============================================================================
#
# History: the Blueprint env-var sync broke at the repo migration (~Phase
# 41); Phase 48 retired this file to documentation and made the dashboard
# the source of truth. Phase 49 then replaced the Oregon service with
# stemquest-api-va (srv-d9go1em1a83c73f50r2g, Virginia) — and when this
# file's `name:` was updated to match, the repo's LMS Blueprint
# (exs-d9fdhi6rnols73bo0rg0) re-adopted the new service. Sync is ALIVE
# again for the service-shape fields below.
#
# What that means:
# - The `services:` block below APPLIES on push to main. Changing `plan:`
#   or `region:` here has real effects (e.g. `plan: free` would downgrade
#   the instance and re-break outbound SMTP — Render free tier blocks all
#   SMTP egress, the Phase 47 lesson).
# - ENV VARS remain dashboard-only (Phase 48 decision stands): keep the
#   `envVars:` block OUT of this file so the Blueprint never fights the
#   hand-entered dashboard values. The names-only inventory at the bottom
#   documents what prod needs set.
#
# No `databases:` key on purpose — Postgres lives on Neon (aws-us-east-1),
# outside Render. Migrations are run from a developer machine with
# DATABASE_URL pointed at Neon. See docs/specs/phase-38-api-live-render-neon.md.

services:
  - type: web
    name: stemquest-api-va
    env: python
    # Starter (paid) since Phase 47: Render's free tier blocks ALL outbound
    # SMTP ports (25/465/587), which broke Gmail SMTP entirely.
    plan: starter
    # Virginia since Phase 49 — co-located with Neon (aws-us-east-1). The
    # original service ran in Oregon and paid ~70-130 ms per DB round trip;
    # after the move, deep health equals shallow. See
    # docs/specs/phase-49-region-move-virginia.md.
    region: virginia
    rootDir: backend
    branch: main

    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    # Shallow path — no query string, so the deploy gate never depends on a
    # cold Neon branch waking up. Use /api/health/?deep=1 for real DB checks.
    healthCheckPath: /api/health/

# ----------------------------------------------------------------------------
# Dashboard env-var inventory (names only — values live in the dashboard).
# Assembled from the retired Blueprint's claims plus the vars hand-entered
# during the Phase 46-47 rollouts; the dashboard itself is authoritative. If
# you add a var in the dashboard, add its name here so this stays accurate.
#
# Core:            PYTHON_VERSION, DEBUG, USE_HTTPS, SECRET_KEY, DATABASE_URL,
#                  ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS,
#                  FRONTEND_URL, ADMIN_URL, SENTRY_DSN
# Demo lockdown:   ALLOW_REGISTRATION, DEMO_ACCOUNT_PASSWORD,
#                  THROTTLE_ANON, THROTTLE_DEMO_LOGIN, THROTTLE_PASSWORD_RESET
# Throttles (P51): THROTTLE_USER, THROTTLE_INVITE_SEND, THROTTLE_INVITE_ACCEPT
#                  (suggested: 120/min, 30/hour, 10/hour)
# Email (Resend since Phase 51 — was Gmail from Phase 47; see
# docs/runbooks/phase-51-email-provider-steps.txt):
#                  EMAIL_BACKEND, EMAIL_HOST, EMAIL_PORT, EMAIL_USE_TLS,
#                  EMAIL_HOST_USER, EMAIL_HOST_PASSWORD, DEFAULT_FROM_EMAIL,
#                  ACCOUNT_EMAIL_VERIFICATION
# Media (R2):      USE_R2, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY,
#                  R2_ACCOUNT_ID, R2_BUCKET_NAME, R2_SIGNED_URL_TTL
# ----------------------------------------------------------------------------
