# Render blueprint for the STEM Quest Django API.
#
# This blueprint governs the live service at https://stemquest-api.onrender.com
# (free instance type, native Python runtime, auto-deploy from `main` on
# Cesar6060/LMS). Applied to Render in Phase 38 via New → Blueprint, which is
# what makes `generateValue` below take effect.
#
# No `databases:` key on purpose — Postgres lives on Neon, outside Render, and
# is wired in through the DATABASE_URL secret below.
#
# Migrations are NOT run here, and they are NOT run in a Render shell either:
# the free instance type has no Shell tab, no SSH, and no preDeployCommand.
# `migrate`, `createsuperuser` and `populate_java_course` are run from a
# developer machine with DATABASE_URL pointed at Neon (which is publicly
# reachable over SSL). See docs/specs/phase-38-api-live-render-neon.md.

services:
  - type: web
    name: stemquest-api
    env: python
    plan: free
    # Must stay co-located with the Neon project (aws-us-east-1). Pairing this
    # with a west-coast region adds ~70 ms to every query.
    region: virginia
    rootDir: backend
    branch: main

    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    # Shallow path — no query string, so the deploy gate never depends on a
    # cold Neon branch waking up. Use /api/health/?deep=1 for real DB checks.
    healthCheckPath: /api/health/

    envVars:
      - key: PYTHON_VERSION
        value: "3.12"          # matches .github/workflows/ci.yml
      - key: DEBUG
        value: "false"
      - key: USE_HTTPS
        value: "true"
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: ACCOUNT_EMAIL_VERIFICATION
        value: optional
      - key: USE_R2
        value: "true"

      # Minted by Render in its own vault on first apply — the key is never
      # pasted into a dashboard, a clipboard, or this repo.
      - key: SECRET_KEY
        generateValue: true

      # Secrets and environment-specific values: prompted in the Render
      # dashboard on first deploy, never committed.
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SENTRY_DSN
        sync: false

      # Cloudflare R2 media storage (Phase 39). Bucket-scoped token; values
      # entered in the dashboard only. R2_PUBLIC_HOST is the pub-<hash>.r2.dev
      # dev subdomain host, no scheme.
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_HOST
        sync: false
