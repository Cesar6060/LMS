# ============================================================================
# DOCUMENTATION ONLY — this file does NOT configure the live service.
# ============================================================================
#
# The Blueprint env-var sync broke at the repo migration to Cesar6060/LMS
# (~Phase 41) and was never repaired: values declared here stopped reaching
# the service, and every env var had to be hand-entered in the Render
# dashboard during the Phase 46/47 rollouts. Phase 48 decision: retire this
# file as a config source instead of reconnecting the Blueprint (a sync of
# the stale file would have re-applied `plan: free`, which blocks all
# outbound SMTP and would re-break Phase 47's email).
#
# THE RENDER DASHBOARD IS THE SINGLE SOURCE OF TRUTH for every env var on
# stemquest-api (srv-d9fdm3jh523c73f0rlkg) — values AND secrets alike.
# Change config there, not here. This file records the service shape so the
# repo still answers "how is prod deployed?" — see the env-var inventory at
# the bottom for "what does prod need set?".
#
# Deploys do not involve this file either: the service is connected directly
# to Cesar6060/LMS and auto-deploys `backend/` on every push to `main`.
#
# No `databases:` key on purpose — Postgres lives on Neon (aws-us-east-1),
# outside Render. Migrations are run from a developer machine with
# DATABASE_URL pointed at Neon. See docs/specs/phase-38-api-live-render-neon.md.

services:
  - type: web
    name: stemquest-api
    env: python
    # Starter (paid) since Phase 47: Render's free tier blocks ALL outbound
    # SMTP ports (25/465/587), which broke Gmail SMTP entirely.
    plan: starter
    # KNOWN DRIFT: the service actually runs in Oregon while Neon Postgres is
    # in aws-us-east-1, so every DB round trip pays ~70-130 ms cross-country
    # (measured Phase 48). Render can't migrate regions in place — fixing it
    # means recreating the service. Phase 49 candidate; see
    # docs/specs/phase-48-retire-render-yaml.md.
    region: oregon
    rootDir: backend
    branch: main

    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    # Shallow path — no query string, so the deploy gate never depends on a
    # cold Neon branch waking up. Use /api/health/?deep=1 for real DB checks.
    healthCheckPath: /api/health/

# ----------------------------------------------------------------------------
# Dashboard env-var inventory (names only — values live in the dashboard).
# Assembled from the retired Blueprint's claims plus the vars hand-entered
# during the Phase 46-47 rollouts; the dashboard itself is authoritative. If
# you add a var in the dashboard, add its name here so this stays accurate.
#
# Core:            PYTHON_VERSION, DEBUG, USE_HTTPS, SECRET_KEY, DATABASE_URL,
#                  ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS,
#                  FRONTEND_URL, ADMIN_URL, SENTRY_DSN
# Demo lockdown:   ALLOW_REGISTRATION, DEMO_ACCOUNT_PASSWORD,
#                  THROTTLE_ANON, THROTTLE_DEMO_LOGIN, THROTTLE_PASSWORD_RESET
# Email (Gmail):   EMAIL_BACKEND, EMAIL_HOST, EMAIL_PORT, EMAIL_USE_TLS,
#                  EMAIL_HOST_USER, EMAIL_HOST_PASSWORD, DEFAULT_FROM_EMAIL,
#                  ACCOUNT_EMAIL_VERIFICATION
# Media (R2):      USE_R2, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY,
#                  R2_ACCOUNT_ID, R2_BUCKET_NAME, R2_SIGNED_URL_TTL
# ----------------------------------------------------------------------------
